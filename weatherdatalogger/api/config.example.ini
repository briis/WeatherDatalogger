# WeatherDatalogger API — example configuration
# Copy to config.ini and fill in your values.

[api]
# Set to true to enable this service.
enabled = false

# Network interface / port to listen on. 0.0.0.0 = all interfaces — put this
# behind a reverse proxy (nginx/Caddy) if exposing it beyond your LAN, see
# README.md.
host = 0.0.0.0
port = 8000

# REQUIRED — shared secret clients must send as the X-API-Key header (REST)
# or ?api_key= query parameter (WebSocket). Generate one with:
#   tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32
api_key = changeme

# How often (seconds) to poll combined_realtime/combined_realtime_stats.
# REST reads and WebSocket pushes are both served from this in-memory cache
# — this interval is the worst-case latency for both.
poll_interval_s = 5

# Comma-separated list of allowed browser origins for CORS, e.g.
# https://dashboard.example.com. Leave empty to disable CORS entirely
# (same-origin/reverse-proxied and non-browser clients are unaffected).
cors_origins =

# Database connection — use a SELECT-only user, not the 'weatherlogger'
# writer user. See scripts/create_api_readonly_user.sh.
db_host     = localhost
db_port     = 3306
db_name     = weatherdatalogger
db_user     = weatherdatalogger_api
# REQUIRED
db_password = changeme

[logging]
# DEBUG / INFO / WARNING / ERROR
level = INFO

# Optional log file (empty = stdout / journald only)
file =
