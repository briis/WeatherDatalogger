# ============================================================
#  Davis AirLink HTTP → MQTT Datalogger — Configuration
# ============================================================
#
# Copy this file to config.ini and fill in your values.
# config.ini is gitignored — never commit real credentials.

[airlink]
# IP address or hostname of your Davis AirLink — must be set before starting the service
host =
# AirLink HTTP port (default 80)
port = 80
# How often to poll the AirLink API (seconds). The AirLink updates every ~10 s
# internally; polling more often than 30 s provides no extra data.
interval_s = 60
# HTTP request timeout (seconds)
timeout_s = 10

[mqtt]
# MQTT broker address and port
broker = localhost
port   = 1883

# Leave empty if your broker requires no authentication
username =
password =

# Set to true if the broker requires TLS/SSL
tls = false

# Base topic — device subtopic is appended automatically:
#   weatherdatalogger/airlink-<device_id>/observation
base_topic = weatherdatalogger

# MQTT client identifier (must be unique per broker)
client_id = airlink-datalogger

# Retain the last message on each topic (useful for Home Assistant etc.)
retain = false

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout only
# file = /var/log/airlink_datalogger.log
file =

[homeassistant]
# Set to true to publish MQTT discovery messages so Home Assistant automatically
# creates a device and sensors. Messages are published once per run (retained).
discovery        = false
# MQTT discovery prefix — must match HA's discovery_prefix setting (default: homeassistant)
discovery_prefix = homeassistant
