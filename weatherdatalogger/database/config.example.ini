# WeatherDB Writer — example configuration
# Copy to config.ini and fill in your values.

[mqtt]
# Hostname or IP of the MQTT broker
broker = localhost
port   = 1883

# Leave empty for anonymous access
username =
password =

# Enable TLS/SSL
tls = false

# Must match the base_topic set in the datalogger(s)
base_topic = weatherdatalogger

# MQTT client identifier — must be unique on the broker
client_id = weatherdb-writer

[database]
host     = localhost
port     = 3306
name     = weatherdatalogger
user     = weatherlogger
password = changeme

[logging]
# DEBUG / INFO / WARNING / ERROR
level = INFO

# Optional log file (empty = stdout / journald only)
file =
