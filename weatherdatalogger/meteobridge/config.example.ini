# ============================================================
#  Meteobridge Datalogger — Configuration
# ============================================================
#
# Copy this file to config.ini and fill in your values.
# config.ini is gitignored — never commit real credentials.
#
# This service polls a Meteobridge's local REST template API for a full
# observation (wind, pressure, temperature/humidity, solar/UV, rain, indoor
# conditions, lightning) and publishes it to MQTT under
# weatherdatalogger/meteobridge-<mac>/observation. db_writer.py picks that
# topic up automatically and writes it to the realtime/history tables like
# any other station — which field of combined_realtime (if any) actually
# comes from this station is controlled by the `station_roles` database
# table, not by this config file.

[meteobridge]
# REQUIRED — IP address or hostname of your Meteobridge
host =
# HTTP port (default 80)
port = 80
# HTTP basic auth for the template API — many Meteobridge units require this
# even with no other security configured. "meteobridge" is Meteobridge's own
# factory-default admin username; set it to empty to send requests without
# an Authorization header at all.
username = meteobridge
password =
# How often to poll Meteobridge and publish an observation (seconds)
interval_s = 60
# HTTP request timeout (seconds)
timeout_s = 10
# Language for wind_beaufort_description — "en" or "da" (same wording as
# davis-vantage-receiver.yaml's beaufort_en/beaufort_da tables)
language = en
# Directory for the persisted lightning-window state file
# (meteobridge_lightning.json). Empty = same directory as this config file.
data_dir =

[mqtt]
# MQTT broker address and port
broker = localhost
port   = 1883

# Leave empty if your broker requires no authentication
username =
password =

# Set to true if the broker requires TLS/SSL
tls = false

# Base topic — the full observation is published to
#   weatherdatalogger/meteobridge-<mac>/observation
base_topic = weatherdatalogger

# Retain the last observation (recommended for Home Assistant)
retain = false

# MQTT client identifier (must be unique per broker)
client_id = meteobridge-datalogger

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout only
file =

[homeassistant]
# Set to true to publish MQTT auto-discovery messages for every sensor.
discovery        = false
discovery_prefix = homeassistant
