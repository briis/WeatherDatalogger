# ============================================================
#  Meteobridge → Davis Rain Corrector — Configuration
# ============================================================
#
# Copy this file to config.ini and fill in your values.
# config.ini is gitignored — never commit real credentials.
#
# This service polls a Meteobridge Pro's local REST template API for the
# Davis Vantage Vue's rain readings (proven consistent with the physical
# console) and republishes them as corrections to the davis-vantage-receiver
# ESPHome device's own MQTT control topics. It does not create its own
# station or database rows.

[meteobridge]
# REQUIRED — IP address or hostname of your Meteobridge
host =
# HTTP port (default 80)
port = 80
# How often to poll Meteobridge and re-publish corrections (seconds)
interval_s = 60
# HTTP request timeout (seconds)
timeout_s = 10

[mqtt]
# MQTT broker address and port
broker = localhost
port   = 1883

# Leave empty if your broker requires no authentication
username =
password =

# Set to true if the broker requires TLS/SSL
tls = false

# Base topic — must match the Davis receiver's own base topic:
#   weatherdatalogger/davis-vantage-receiver/set_daily_rain
#   weatherdatalogger/davis-vantage-receiver/set_rain_rate
base_topic = weatherdatalogger

# MQTT client identifier (must be unique per broker)
client_id = meteobridge-datalogger

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout only
file =
