# ============================================================
#  WeatherDatalogger — Shared Configuration
# ============================================================
#
# All services (tempest-datalogger, airlink-datalogger, meteobridge-datalogger,
# visualcrossing-datalogger, weatherdb-writer) read from this single file.
#
# Copy to /opt/weatherdatalogger/config.ini and fill in the
# values marked REQUIRED.  Everything else has a sensible default
# and can be left as-is until you need to change it.
#
# Every station/forecast service is off by default (`enabled = false`) —
# set `enabled = true` under each one you actually own/use. This keeps a
# fresh install from trying to poll hardware or APIs that aren't there.
#
# This file is never overwritten by the deploy script once created.

# ── Shared settings (read by all services) ──────────────────────────────────

[mqtt]
# REQUIRED — MQTT broker hostname or IP address
broker     = localhost
port       = 1883

# Leave empty if your broker requires no authentication
username   =
password   =

# Set to true if the broker requires TLS/SSL
tls        = false

# Root topic prefix — must be the same for all services
base_topic = weatherdatalogger

# Retain the last message on each state topic (recommended for Home Assistant)
retain     = false

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos        = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout / journald only
# file = /var/log/weatherdatalogger/weatherdata.log
file  =

[homeassistant]
# Set to true to publish MQTT auto-discovery messages.
# Both tempest-datalogger and airlink-datalogger honour this setting.
discovery        = false
discovery_prefix = homeassistant

# ── Tempest datalogger ──────────────────────────────────────────────────────

[tempest]
# Set to true to enable this service. Only enable stations you actually own.
enabled = false

[udp]
# Network interface to listen on (0.0.0.0 = all interfaces)
listen_address = 0.0.0.0
# Tempest hub always broadcasts on UDP port 50222
listen_port    = 50222

[station]
# Station elevation above sea level in metres — required for accurate
# sea level pressure.  Set this to your actual elevation (e.g. 42).
elevation_m           = 0
# Height of the Tempest pressure sensor above ground in metres (usually 1–2 m)
height_above_ground_m = 0
# Directory for persisted data files (pressure history, lightning history).
data_dir = /opt/weatherdatalogger/tempest

# ── AirLink datalogger ──────────────────────────────────────────────────────

[airlink]
# Set to true to enable this service. Only enable stations you actually own.
enabled    = false
# REQUIRED if enabled — IP address or hostname of your Davis AirLink
host       =
# HTTP port (default 80)
port       = 80
# How often to poll the AirLink API in seconds
interval_s = 60
# HTTP request timeout in seconds
timeout_s  = 10

# ── Meteobridge datalogger (optional) ───────────────────────────────────────
# A full station integration — publishes weatherdatalogger/meteobridge-<mac>/
# observation, picked up by db_writer.py like any other station. Which
# combined_realtime field (if any) is sourced from it is controlled by the
# `station_roles` database table — see
# weatherdatalogger/meteobridge/config.example.ini for details.

[meteobridge]
# Set to true to enable this service. Only enable stations you actually own.
enabled    = false
# REQUIRED if enabled — IP address or hostname of your Meteobridge
host       =
# HTTP port (default 80)
port       = 80
# HTTP basic auth for the template API — many Meteobridge units require this
# even with no other security configured. "meteobridge" is Meteobridge's own
# factory-default admin username; set it to empty to send requests without
# an Authorization header at all.
username   = meteobridge
password   =
# How often to poll Meteobridge and publish an observation, in seconds
interval_s = 60
# HTTP request timeout in seconds
timeout_s  = 10
# Language for wind_beaufort_description — "en" or "da"
language   = en
# Directory for the persisted lightning/air-quality window state files.
# Empty = same directory as this config file.
data_dir   =

# ── Visual Crossing forecast (optional) ─────────────────────────────────────
# Lat/lon-based forecast — no WeatherFlow station or other hardware required.
# See weatherdatalogger/visualcrossing/config.example.ini for details.

[visualcrossing]
# Set to true to enable polling (left false so a blank api_key doesn't
# crash-loop the service).
enabled      = false
# REQUIRED — free tier (1000 calls/day) at
# https://www.visualcrossing.com/weather-data-editions
api_key      =
# REQUIRED — decimal latitude/longitude of the forecast location
latitude     =
longitude    =
# Forecast days to request (today + next N); 14 is the free-tier maximum
days         = 14
# Language for the (unused) native condition text — see
# pyVisualCrossing.const.SUPPORTED_LANGUAGES (includes da)
language     = en
# Slug used in the MQTT topic: weatherdatalogger/forecast-visualcrossing-<location>/…
location     = home
# How often to poll, in minutes — each poll is one API call (60 min = 24/day)
interval_min = 60

# ── Database writer ─────────────────────────────────────────────────────────

[database]
host     = localhost
port     = 3306
name     = weatherdatalogger
user     = weatherlogger
# REQUIRED — database password
password =
