# ============================================================
#  Visual Crossing → MQTT Forecast Datalogger — Configuration
# ============================================================
#
# Copy this file to config.ini and fill in your values.
# config.ini is gitignored — never commit real credentials.
#
# This service polls the Visual Crossing Timeline Weather API (via the
# pyVisualCrossing wrapper) for current conditions plus hourly/daily
# forecasts, and republishes them to MQTT under
# weatherdatalogger/forecast-<location>/{current,forecast_hourly,forecast_daily}
# — the same topic shape the WeatherFlow Better Forecast poller used to
# publish. It is purely lat/lon-based; no weather station is required.

[visualcrossing]
# Set to true to enable polling. Left false by default so a missing/blank
# api_key doesn't crash-loop the service.
enabled = false

# REQUIRED — Visual Crossing API key. Sign up for the free tier (1000
# calls/day) at https://www.visualcrossing.com/weather-data-editions
api_key =

# REQUIRED — forecast location as decimal latitude/longitude, e.g. 55.6761
latitude =
longitude =

# Number of forecast days to request (today + next N). 14 is the free-tier
# maximum; pyVisualCrossing itself clamps anything higher back to 14.
days = 14

# Language for the (unused-by-us) native condition text — see
# pyVisualCrossing.const.SUPPORTED_LANGUAGES for the full list (includes da).
# Only affects text fields we don't currently republish; the "condition"
# field in our MQTT payload is always the HA-mapped icon, not this text.
language = en

# Slug used in the MQTT topic: weatherdatalogger/forecast-<location>/...
# Use a short slug without spaces, e.g. "home", "office", "cabin".
location = home

# How often to poll (minutes). Each poll is one API call — stay well under
# the free tier's 1000 calls/day (60 min = 24 calls/day).
interval_min = 60

[mqtt]
# MQTT broker address and port
broker = localhost
port   = 1883

# Leave empty if your broker requires no authentication
username =
password =

# Set to true if the broker requires TLS/SSL
tls = false

# Base topic — must match the other services' base topic
base_topic = weatherdatalogger

# MQTT client identifier (must be unique per broker)
client_id = visualcrossing-datalogger

# Retain the last message on each topic (recommended for Home Assistant/db_writer
# to have a value immediately on (re)connect, rather than waiting for the next poll)
retain = true

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout only
file =
