# ============================================================
#  WeatherFlow Tempest UDP → MQTT Datalogger — Configuration
# ============================================================
#
# Copy this file to config.ini and fill in your values.
# config.ini is gitignored — never commit real credentials.

[udp]
# Network interface to listen on (0.0.0.0 = all interfaces)
listen_address = 0.0.0.0
# Tempest hub always broadcasts on port 50222
listen_port    = 50222

[mqtt]
# MQTT broker address and port
broker = localhost
port   = 1883

# Leave empty if your broker requires no authentication
username =
password =

# Set to true if the broker requires TLS/SSL
tls = false

# Base topic — station subtopic is appended automatically:
#   weatherdatalogger/tempest-<serial>/<message_type>
base_topic = weatherdatalogger

# MQTT client identifier (must be unique per broker)
client_id = tempest-datalogger

# Retain the last message on each topic (useful for Home Assistant etc.)
retain = false

# QoS level: 0 = at most once, 1 = at least once, 2 = exactly once
qos = 0

[logging]
# Log level: DEBUG | INFO | WARNING | ERROR
level = INFO

# Optional log file path — leave empty to log to stdout only
# file = /var/log/tempest_datalogger.log
file =

[homeassistant]
# Set to true to publish MQTT discovery messages so Home Assistant automatically
# creates devices and sensors. Messages are published once per run (retained).
discovery        = false
# MQTT discovery prefix — must match HA's discovery_prefix setting (default: homeassistant)
discovery_prefix = homeassistant

[station]
# Station elevation above sea level in metres — used to derive sea level pressure.
# Set this to your actual elevation for accurate results (e.g. 42).
elevation_m          = 0
# Height of the Tempest pressure sensor above ground level in metres (usually 1-2 m).
height_above_ground_m = 0
