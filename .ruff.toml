# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py311"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"**/scripts/**" = [
    "S311",  # random is fine for weather simulation data
    "T201",  # print is fine in CLI dev scripts
]
"tests/**" = [
    "S101",    # assert is expected in tests
    "ANN",     # type annotations not required in tests
    "D",       # docstrings not required in tests
    "PLR2004", # magic values in assertions are fine
    "SLF001",  # private member access is valid in tests
    "ARG001",  # fixtures used for side-effects may appear unused
    "ARG002",  # same for methods
    "PT004",   # autouse fixtures don't need to return a value
]