substitutions:
  device: air-quality-monitor
  # Fixed station-id suffix for MQTT (weatherdatalogger/aqmonitor-<device_id>/...).
  # There's only one of these devices on the network today — bump this number
  # if a second unit is ever added, so they don't collide on the same topic.
  device_id: "01"

esphome:
  name: "${device}"
  friendly_name: "Air Quality Monitor"
  on_boot:
    # Restores the last known PM values from flash, so AQI doesn't sit
    # blank/NaN for up to 5 minutes after a reboot. Runs late in the boot
    # process (after components are set up), so id() references and
    # .update() calls are valid.
    priority: -10
    then:
      - lambda: |-
          if (!isnan(id(last_pm25))) {
            id(pm_2_5).publish_state(id(last_pm25));
          }
          if (!isnan(id(last_pm10))) {
            id(pm_10_0).publish_state(id(last_pm10));
          }
          // Force AQI/CAQI and the category text to recompute immediately
          // from the restored PM values, instead of waiting for their own
          // 5-minute update_interval.
          id(aqi_index).update();
          id(aqi_category).update();
          id(aqi_pm25_index).update();
          id(aqi_pm10_index).update();
          id(caqi_pm25_index).update();
          id(caqi_pm10_index).update();

globals:
  - id: last_pm25
    type: float
    restore_value: true
    initial_value: 'NAN'
  - id: last_pm10
    type: float
    restore_value: true
    initial_value: 'NAN'

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    # ESP-IDF is recommended for the C6 - Arduino-core support is newer
    # and less mature for this chip than for classic ESP32/S3.

# --- Network ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "AQM Fallback"
    password: !secret fallback_ap_password

captive_portal:

logger:

# api: kept solely for remote `esphome logs`/OTA — do NOT also add this
# node via Home Assistant's "ESPHome" integration UI, or entities would be
# duplicated (once via native API, once via MQTT discovery below).
# api:
#   encryption:
#     key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- Time — SNTP (not Home Assistant), so this device's data path stays
# independent of whether it's ever added via HA's ESPHome integration —
# see the api: comment above. Used to timestamp "Last Updated". ---
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Copenhagen  # adjust if this device isn't in Denmark
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

# --- MQTT — set credentials in secrets.yaml
# discovery: true — publishes ESPHome's built-in HA MQTT discovery config,
# grouping all sensors under one device in HA, same as the Davis receiver.
# api: above is kept solely for remote logs/OTA — do NOT also add this node
# via HA's ESPHome integration UI, or entities would be duplicated.
# reboot_timeout: 0s is set explicitly — see AGENT.md/CONTEXT.md "Known
# Issues": a short reboot_timeout on the Davis receiver made it reboot
# every 10-25 minutes on routine MQTT hiccups.
# ---------------------------------------------------------------------------
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  client_id: ${device}
  discovery: true
  skip_cert_cn_check: true
  reboot_timeout: 0s

# --- UART for the SDS011 ---
# The SDS011 communicates at 9600 baud.
# Sensor TX -> ESP32-C6 RX, Sensor RX -> ESP32-C6 TX
# GPIO16/17 are ordinary GPIOs on the C6-DevKitC-1 - not strapping pins,
# not reserved for USB-JTAG (GPIO12/13) or flash (GPIO24-30).
uart:
 id: sds011_uart
 tx_pin: GPIO19
 rx_pin: GPIO18
 baud_rate: 9600

# --- I2C for the BME280 ---
# GPIO21/22 are likewise free, ordinary GPIOs on this board.
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a

sensor:
#  --- SDS011 PM sensor ---
  - platform: sds011
    uart_id: sds011_uart
    pm_2_5:
      name: "PM2.5"
      id: pm_2_5
      accuracy_decimals: 1
      device_class: pm25
      state_class: measurement
      on_value:
        then:
          - globals.set:
              id: last_pm25
              value: !lambda 'return x;'
          # Recompute AQI/CAQI immediately rather than waiting for their own
          # 5-minute update_interval, which can otherwise easily drift out
          # of phase with the SDS011's own measurement timing.
          - lambda: |-
              id(aqi_index).update();
              id(aqi_category).update();
              id(aqi_pm25_index).update();
              id(caqi_pm25_index).update();
          - text_sensor.template.publish:
              id: last_updated
              state: !lambda 'return id(sntp_time).now().strftime("%Y-%m-%d %H:%M:%S");'
    pm_10_0:
      name: "PM10"
      id: pm_10_0
      accuracy_decimals: 1
      device_class: pm10
      state_class: measurement
      on_value:
        then:
          - globals.set:
              id: last_pm10
              value: !lambda 'return x;'
          - lambda: |-
              id(aqi_index).update();
              id(aqi_category).update();
              id(aqi_pm10_index).update();
              id(caqi_pm10_index).update();
    update_interval: 5min
    # Duty cycle: the SDS011 stores this value itself in its own flash and
    # controls ON/OFF of the laser+fan internally. At 1-30 min it powers on
    # for ~30 seconds before each reading and stays off the rest of the
    # time. Set update_interval: 0min for continuous measurement (not
    # recommended for laser lifetime). Requires ESP32 TX -> sensor RX to be
    # connected (rx_only must NOT be set/true).

#  --- BME280 temperature/humidity/pressure ---
  - platform: bme280_i2c
    i2c_id: bus_a
    address: 0x76   # use 0x77 if 0x76 isn't found by the i2c scan
    update_interval: 60s
    temperature:
      name: "Temperature"
      id: temperature
      accuracy_decimals: 1
      device_class: temperature
      state_class: measurement
    humidity:
      name: "Humidity"
      id: humidity
      accuracy_decimals: 1
      device_class: humidity
      state_class: measurement
    pressure:
      name: "Pressure"
      id: pressure
      accuracy_decimals: 1
      device_class: pressure
      state_class: measurement

  # --- Dew point — computed from BME280 temperature/humidity (Magnus
  # formula), the same formula ESPHome/davis/davisnet-weatherlogger.yaml and
  # tempest_datalogger.py use, for consistency across stations. ---
  - platform: template
    name: "Dew Point"
    id: dew_point
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 60s
    lambda: |-
      float t = id(temperature).state;
      float rh = id(humidity).state;
      if (isnan(t) || isnan(rh)) {
        return {};
      }
      float gamma = log(rh / 100.0f) + 17.625f * t / (243.04f + t);
      return 243.04f * gamma / (17.625f - gamma);

  # --- Computed AQI (US EPA Air Quality Index) ---
  # Uses EPA's official breakpoint table (PM2.5 breakpoints updated
  # May 2024, PM10 breakpoints unchanged). AQI is defined as the higher
  # of the two sub-indices - not an average - since air quality is only
  # as good as the worst pollutant.
  # NOTE: EPA's table is designed for 24-hour averages. Here the SDS011's
  # instantaneous readings are used directly, so the value is an
  # approximation and can swing more than an "official" AQI would.
  - platform: template
    name: "AQI"
    id: aqi_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    device_class: aqi
    state_class: measurement
    update_interval: never
    lambda: |-
      float pm25 = id(pm_2_5).state;
      float pm10 = id(pm_10_0).state;
      if (isnan(pm25) || isnan(pm10)) {
        return {};
      }

      // --- PM2.5 sub-index (EPA breakpoints, updated May 2024) ---
      float aqi_pm25;
      if (pm25 <= 9.0) {
        aqi_pm25 = (50.0 / 9.0) * pm25;
      } else if (pm25 <= 35.4) {
        aqi_pm25 = ((100.0 - 51.0) / (35.4 - 9.1)) * (pm25 - 9.1) + 51.0;
      } else if (pm25 <= 55.4) {
        aqi_pm25 = ((150.0 - 101.0) / (55.4 - 35.5)) * (pm25 - 35.5) + 101.0;
      } else if (pm25 <= 125.4) {
        aqi_pm25 = ((200.0 - 151.0) / (125.4 - 55.5)) * (pm25 - 55.5) + 151.0;
      } else if (pm25 <= 225.4) {
        aqi_pm25 = ((300.0 - 201.0) / (225.4 - 125.5)) * (pm25 - 125.5) + 201.0;
      } else if (pm25 <= 325.4) {
        aqi_pm25 = ((500.0 - 301.0) / (325.4 - 225.5)) * (pm25 - 225.5) + 301.0;
      } else {
        aqi_pm25 = 500.0;
      }

      // --- PM10 sub-index (unchanged EPA breakpoints) ---
      float aqi_pm10;
      if (pm10 <= 54.0) {
        aqi_pm10 = (50.0 / 54.0) * pm10;
      } else if (pm10 <= 154.0) {
        aqi_pm10 = ((100.0 - 51.0) / (154.0 - 55.0)) * (pm10 - 55.0) + 51.0;
      } else if (pm10 <= 254.0) {
        aqi_pm10 = ((150.0 - 101.0) / (254.0 - 155.0)) * (pm10 - 155.0) + 101.0;
      } else if (pm10 <= 354.0) {
        aqi_pm10 = ((200.0 - 151.0) / (354.0 - 255.0)) * (pm10 - 255.0) + 151.0;
      } else if (pm10 <= 424.0) {
        aqi_pm10 = ((300.0 - 201.0) / (424.0 - 355.0)) * (pm10 - 355.0) + 201.0;
      } else if (pm10 <= 504.0) {
        aqi_pm10 = ((400.0 - 301.0) / (504.0 - 425.0)) * (pm10 - 425.0) + 301.0;
      } else if (pm10 <= 604.0) {
        aqi_pm10 = ((500.0 - 401.0) / (604.0 - 505.0)) * (pm10 - 505.0) + 401.0;
      } else {
        aqi_pm10 = 500.0;
      }

      return std::max(aqi_pm25, aqi_pm10);

  # --- AQI sub-indices, PM2.5 and PM10 separately — same columns
  # (aqi_pm2p5/aqi_pm10) Davis AirLink uses (airlink_datalogger.py), so
  # db_writer.py stores them in the same fields. Uses the same (May 2024
  # updated) EPA breakpoints as "AQI" above, NOT airlink_datalogger.py's
  # older breakpoint table — the two stations' aqi_pm2p5/aqi_pm10 values are
  # therefore not bit-for-bit identical at the same concentration, only the
  # same scale/definition (US EPA AQI, 0-500). Duplicated deliberately
  # rather than shared code — same principle as
  # airlink_datalogger.py/meteobridge_datalogger.py, which each keep their
  # own copies of the breakpoint tables (see AGENT.md). ---
  - platform: template
    name: "AQI PM2.5"
    id: aqi_pm25_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    device_class: aqi
    state_class: measurement
    update_interval: never
    lambda: |-
      float pm25 = id(pm_2_5).state;
      if (isnan(pm25)) {
        return {};
      }
      if (pm25 <= 9.0) {
        return (50.0 / 9.0) * pm25;
      } else if (pm25 <= 35.4) {
        return ((100.0 - 51.0) / (35.4 - 9.1)) * (pm25 - 9.1) + 51.0;
      } else if (pm25 <= 55.4) {
        return ((150.0 - 101.0) / (55.4 - 35.5)) * (pm25 - 35.5) + 101.0;
      } else if (pm25 <= 125.4) {
        return ((200.0 - 151.0) / (125.4 - 55.5)) * (pm25 - 55.5) + 151.0;
      } else if (pm25 <= 225.4) {
        return ((300.0 - 201.0) / (225.4 - 125.5)) * (pm25 - 125.5) + 201.0;
      } else if (pm25 <= 325.4) {
        return ((500.0 - 301.0) / (325.4 - 225.5)) * (pm25 - 225.5) + 301.0;
      } else {
        return 500.0;
      }

  - platform: template
    name: "AQI PM10"
    id: aqi_pm10_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    device_class: aqi
    state_class: measurement
    update_interval: never
    lambda: |-
      float pm10 = id(pm_10_0).state;
      if (isnan(pm10)) {
        return {};
      }
      if (pm10 <= 54.0) {
        return (50.0 / 54.0) * pm10;
      } else if (pm10 <= 154.0) {
        return ((100.0 - 51.0) / (154.0 - 55.0)) * (pm10 - 55.0) + 51.0;
      } else if (pm10 <= 254.0) {
        return ((150.0 - 101.0) / (254.0 - 155.0)) * (pm10 - 155.0) + 101.0;
      } else if (pm10 <= 354.0) {
        return ((200.0 - 151.0) / (354.0 - 255.0)) * (pm10 - 255.0) + 151.0;
      } else if (pm10 <= 424.0) {
        return ((300.0 - 201.0) / (424.0 - 355.0)) * (pm10 - 355.0) + 201.0;
      } else if (pm10 <= 504.0) {
        return ((400.0 - 301.0) / (504.0 - 425.0)) * (pm10 - 425.0) + 301.0;
      } else if (pm10 <= 604.0) {
        return ((500.0 - 401.0) / (604.0 - 505.0)) * (pm10 - 505.0) + 401.0;
      } else {
        return 500.0;
      }

  # --- CAQI (EU CITEAIR Common Air Quality Index) — same breakpoints as
  # airlink_datalogger.py's _CAQI_PM25_BREAKPOINTS/_CAQI_PM10_BREAKPOINTS.
  # Computed from the current (instantaneous) concentration, not a rolling
  # average — CAQI is designed as a real-time index, unlike US AQI's
  # NowCast convention. Official bands only go up to 100 ("Very High");
  # beyond that it's extrapolated at the same slope and capped at 200
  # instead of returning empty, same convention as AirLink. ---
  - platform: template
    name: "CAQI PM2.5"
    id: caqi_pm25_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    device_class: aqi
    state_class: measurement
    update_interval: never
    lambda: |-
      float pm25 = id(pm_2_5).state;
      if (isnan(pm25)) {
        return {};
      }
      if (pm25 <= 15.0) {
        return (25.0 / 15.0) * pm25;
      } else if (pm25 <= 30.0) {
        return ((50.0 - 25.0) / (30.0 - 15.0)) * (pm25 - 15.0) + 25.0;
      } else if (pm25 <= 55.0) {
        return ((75.0 - 50.0) / (55.0 - 30.0)) * (pm25 - 30.0) + 50.0;
      } else if (pm25 <= 110.0) {
        return ((100.0 - 75.0) / (110.0 - 55.0)) * (pm25 - 55.0) + 75.0;
      } else if (pm25 <= 330.0) {
        return ((200.0 - 100.0) / (330.0 - 110.0)) * (pm25 - 110.0) + 100.0;
      } else {
        return 200.0;  // beyond the extrapolated ceiling — capped, not omitted
      }

  - platform: template
    name: "CAQI PM10"
    id: caqi_pm10_index
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    device_class: aqi
    state_class: measurement
    update_interval: never
    lambda: |-
      float pm10 = id(pm_10_0).state;
      if (isnan(pm10)) {
        return {};
      }
      if (pm10 <= 25.0) {
        return (25.0 / 25.0) * pm10;
      } else if (pm10 <= 50.0) {
        return ((50.0 - 25.0) / (50.0 - 25.0)) * (pm10 - 25.0) + 25.0;
      } else if (pm10 <= 90.0) {
        return ((75.0 - 50.0) / (90.0 - 50.0)) * (pm10 - 50.0) + 50.0;
      } else if (pm10 <= 180.0) {
        return ((100.0 - 75.0) / (180.0 - 90.0)) * (pm10 - 90.0) + 75.0;
      } else if (pm10 <= 540.0) {
        return ((200.0 - 100.0) / (540.0 - 180.0)) * (pm10 - 180.0) + 100.0;
      } else {
        return 200.0;  // beyond the extrapolated ceiling — capped, not omitted
      }

binary_sensor:
  # --- Alarm when AQI exceeds 100 (Unhealthy for sensitive groups) ---
  - platform: template
    name: "AQI Alarm"
    id: aqi_alarm
    device_class: problem
    lambda: |-
      float aqi = id(aqi_index).state;
      if (isnan(aqi)) {
        return {};
      }
      return aqi > 100;

text_sensor:
  # --- Timestamp of the last real PM measurement ---
  - platform: template
    name: "Last Updated"
    id: last_updated
    icon: "mdi:clock-outline"

  # --- AQI category as human-readable text ---
  - platform: template
    name: "AQI Category"
    id: aqi_category
    icon: "mdi:air-filter"
    update_interval: never
    lambda: |-
      float aqi = id(aqi_index).state;
      if (isnan(aqi)) {
        return {};
      }
      if (aqi <= 50) {
        return {"Good"};
      } else if (aqi <= 100) {
        return {"Moderate"};
      } else if (aqi <= 150) {
        return {"Unhealthy for Sensitive Groups"};
      } else if (aqi <= 200) {
        return {"Unhealthy"};
      } else if (aqi <= 300) {
        return {"Very Unhealthy"};
      } else {
        return {"Hazardous"};
      }

# --- weatherdatalogger MQTT observation ---
# Publishes a consolidated JSON object every 60 seconds with the latest
# known values of every field — same "latest known value" principle as
# ESPHome/davis/davisnet-weatherlogger.yaml's observation payload. PM/AQI/CAQI
# only actually update every 5 minutes (the SDS011's own duty cycle), but
# are published every minute anyway alongside the BME280 values, so
# realtime/history in the database don't go "stale" between PM readings.
# Field names match db_writer.py's _OBS_FIELDS (same columns as
# Davis AirLink) — see ESPHome/airquality/README.md.
# serial_number/timestamp are deliberately omitted, same as on the Davis
# receiver: db_writer.py falls back to the topic segment and arrival time —
# this device has neither a hardware serial number nor an RF timestamp.
# ---------------------------------------------------------------------------
interval:
  - interval: 60s
    then:
      - lambda: |-
          char buf[512];
          int pos = snprintf(buf, sizeof(buf), "{");

          if (!isnan(id(pm_2_5).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"pm_2p5_ugm3\":%.1f", pos > 1 ? "," : "", id(pm_2_5).state);
          }
          if (!isnan(id(pm_10_0).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"pm_10_ugm3\":%.1f", pos > 1 ? "," : "", id(pm_10_0).state);
          }
          if (!isnan(id(aqi_pm25_index).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"aqi_pm2p5\":%.0f", pos > 1 ? "," : "", id(aqi_pm25_index).state);
          }
          if (!isnan(id(aqi_pm10_index).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"aqi_pm10\":%.0f", pos > 1 ? "," : "", id(aqi_pm10_index).state);
          }
          if (!isnan(id(caqi_pm25_index).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"caqi_pm2p5\":%.0f", pos > 1 ? "," : "", id(caqi_pm25_index).state);
          }
          if (!isnan(id(caqi_pm10_index).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"caqi_pm10\":%.0f", pos > 1 ? "," : "", id(caqi_pm10_index).state);
          }
          if (!isnan(id(temperature).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"air_temperature_c\":%.1f", pos > 1 ? "," : "", id(temperature).state);
          }
          if (!isnan(id(humidity).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"relative_humidity_pct\":%.1f", pos > 1 ? "," : "", id(humidity).state);
          }
          if (!isnan(id(dew_point).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"dew_point_c\":%.1f", pos > 1 ? "," : "", id(dew_point).state);
          }
          if (!isnan(id(pressure).state)) {
            pos += snprintf(buf + pos, sizeof(buf) - pos,
              "%s\"station_pressure_mb\":%.1f", pos > 1 ? "," : "", id(pressure).state);
          }

          snprintf(buf + pos, sizeof(buf) - pos, "}");
          id(mqtt_client).publish("weatherdatalogger/aqmonitor-${device_id}/observation", buf);

# --- About the ESP32-C6 specifically ---
# This chip also has built-in WiFi 6, BLE 5, and IEEE 802.15.4
# (Zigbee 3.0 / Thread). ESPHome currently only uses the WiFi part above -
# Zigbee/Thread requires separate firmware (the ESP-IDF Zigbee stack) and
# can't run at the same time as a regular ESPHome node on the same chip.
# Relevant if you later want to build a dedicated Zigbee/Thread bridge or
# Matter device on C6 hardware.

# --- About the SDS011's duty cycle ---
# ESPHome's sds011 component writes update_interval directly to the
# sensor's own "working period" register. The sensor then controls
# laser/fan on/off itself, independent of the ESP32 - this requires no
# deep sleep or external components. The value is persistent in the
# sensor's own flash, so it's remembered even after a power loss.
#
# Trade-off: with a 5 min cycle, PM2.5/PM10 only update every 5 minutes in
# Home Assistant. The BME280 still measures every minute (independent of
# the SDS011).
