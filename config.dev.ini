# ============================================================
#  WeatherFlow Tempest UDP → MQTT Datalogger — Dev Config
# ============================================================
#
# Used inside the devcontainer for local testing.
# Mosquitto runs on localhost (started by postStartCommand).
# Inject simulated UDP packets with scripts/simulate_udp.py.

[udp]
listen_address = 0.0.0.0
listen_port    = 50222

[mqtt]
broker   = localhost
port     = 1883
username =
password =
tls      = false
base_topic = weatherdatalogger
client_id  = tempest-datalogger-dev
retain     = false
qos        = 0

[logging]
level = DEBUG
file  =

[homeassistant]
discovery        = true
discovery_prefix = homeassistant
